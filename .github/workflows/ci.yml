name: ci

on:
  push:
    branches: [main, v1]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shortener
          POSTGRES_PASSWORD: shortener
          POSTGRES_DB: shortener
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U shortener"
          --health-interval 5s --health-timeout 3s --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck api
        run: bunx tsc --noEmit
        working-directory: apps/api
      - name: Test api (integration tests hit the service containers)
        run: bun test
        working-directory: apps/api
      - name: Typecheck + build web
        run: bun run build
        working-directory: apps/web
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/url-shortener:latest
            ghcr.io/${{ github.repository_owner }}/url-shortener:${{ github.sha }}
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/shortener
            docker compose -f compose.prod.yml pull app
            docker compose -f compose.prod.yml up -d
            docker image prune -f
