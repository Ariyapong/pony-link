name: ci

on:
  push:
    branches: [main, v1]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shortener
          POSTGRES_PASSWORD: shortener
          POSTGRES_DB: shortener
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U shortener"
          --health-interval 5s --health-timeout 3s --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck api
        run: bunx tsc --noEmit
        working-directory: apps/api
      - name: Test api (integration tests hit the service containers)
        run: bun test
        working-directory: apps/api
      - name: Typecheck + build web
        run: bun run build
        working-directory: apps/web
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # The secrets context isn't allowed in a step-level `if`; bridge it
      # through job env (allowed) so the SSH step can be gated on it below.
      VPS_HOST: ${{ secrets.VPS_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR requires a lowercase repository path; github.repository_owner
      # preserves the account's casing (Ariyapong), so lowercase it here.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/pony-link" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
      - name: Deploy over SSH
        # Skipped until the VPS exists: secrets are added in the runbook's
        # GitHub step, and this activates automatically on the next push.
        if: ${{ env.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/pony-link
            docker compose -f compose.prod.yml pull app
            docker compose -f compose.prod.yml up -d
            docker image prune -f
